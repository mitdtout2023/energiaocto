<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EnergiaOcto Admin">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A1628">
<title>EnergiaOcto Admin ⚡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap');

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  height:100%;
  height:-webkit-fill-available;
  background:#000;
  overflow:hidden;
}
body{
  font-family:'DM Sans',-apple-system,'Helvetica Neue',sans-serif;
  background:#F2F4F8;color:#0F1923;
  min-height:100vh;
  min-height:-webkit-fill-available;
  height:100dvh;
  max-height:100dvh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  /* NÃO usa position:fixed nem user-select:none 
     pois bloqueia inputs no iOS Safari */
  width:100%;
  margin:0;
}

/* ══════════════════════════════════════════
   SPLASH — EnergiaOcto (fiel ao design)
══════════════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  /* Cobre safe-area também */
  top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 90% 80% at 50% 40%, #0D1F5C 0%, #08122E 55%, #060E20 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease,transform .6s ease;
  /* Botão que cobre tudo — iOS respeita user gesture em button */
  border:none;outline:none;padding:0;margin:0;
  width:100%;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#splash.out{opacity:0;transform:scale(1.06);pointer-events:none}

/* Anéis pulsantes ao redor do ícone */
.sp-rings{
  position:absolute;
  width:140px;height:140px;
  pointer-events:none;
}
.sp-ring{
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(100,140,255,.18);
  animation:ringOut 3s ease-in-out infinite;
}
.sp-ring:nth-child(1){inset:-16px;animation-delay:0s}
.sp-ring:nth-child(2){inset:-32px;animation-delay:.5s;border-color:rgba(100,140,255,.10)}
.sp-ring:nth-child(3){inset:-50px;animation-delay:1s;border-color:rgba(100,140,255,.05)}
@keyframes ringOut{
  0%{transform:scale(.88);opacity:0}
  30%{opacity:1}
  100%{transform:scale(1.12);opacity:0}
}

/* Wrapper do ícone */
.sp-icon-wrap{
  position:relative;
  width:140px;height:140px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:36px;
  animation:iconPop .7s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes iconPop{
  from{opacity:0;transform:scale(.35) translateY(18px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* Cartão do ícone — igual ao da imagem */
.sp-icon-card{
  width:118px;height:118px;
  border-radius:28px;
  background:linear-gradient(160deg,#1A2B5E 0%,#111D45 100%);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:
    0 32px 80px rgba(0,0,0,.6),
    0 8px 24px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  overflow:hidden;
}
/* Gradiente de luz no canto superior direito do card */
.sp-icon-card::before{
  content:'';position:absolute;
  top:-20px;right:-20px;
  width:80px;height:80px;
  background:radial-gradient(circle,rgba(90,120,255,.25),transparent 70%);
}

/* SVG do Octo — laranja/rosa como na imagem */
.sp-octo-svg{
  width:80px;height:80px;
  position:relative;z-index:1;
  filter:drop-shadow(0 4px 16px rgba(255,140,80,.4));
  animation:octoFloat 3s ease-in-out infinite .8s;
}
@keyframes octoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

/* Sombra embaixo do card */
.sp-icon-shadow{
  position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  width:70px;height:10px;
  background:radial-gradient(ellipse,rgba(28,80,255,.35),transparent 70%);
  filter:blur(6px);
}

/* Textos */
.sp-title{
  font-size:42px;font-weight:900;letter-spacing:-1.5px;
  color:#fff;line-height:1;
  animation:spFade .5s ease .65s both;
  display:flex;align-items:center;gap:10px;
}
.sp-title-octo{color:#3B82F6}
.sp-title-bolt{font-size:36px;animation:boltPulse 1.5s ease-in-out infinite .9s}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.92)}}
.sp-sub{
  font-size:15px;font-weight:400;color:rgba(255,255,255,.45);
  margin-top:10px;letter-spacing:.2px;
  animation:spFade .5s ease .8s both;
}
@keyframes spFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Barra de progresso */
.sp-bar-wrap{
  width:80px;height:3px;
  background:rgba(255,255,255,.08);border-radius:2px;
  margin-top:52px;overflow:hidden;
  animation:spFade .3s ease .95s both;
}
.sp-bar-fill{
  height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,#2563EB,#60A5FA);
  animation:barLoad 1.6s 1s ease forwards;
}
@keyframes barLoad{to{width:100%}}

/* Dica de toque (aparece após 0.8s) */
.sp-tap-hint{
  position:absolute;bottom:calc(32px + env(safe-area-inset-bottom));
  font-size:12px;color:rgba(255,255,255,.25);font-weight:500;
  letter-spacing:.4px;
  animation:spFade .4s ease 1.2s both;
}
/* Versão */
.sp-version{
  position:absolute;top:calc(18px + env(safe-area-inset-top));right:20px;
  font-size:11px;color:rgba(255,255,255,.18);font-weight:600;letter-spacing:.5px;
}

/* ══════════════════════════════════════════
   MODAL DE SENHA (aparece ao clicar Admin)
══════════════════════════════════════════ */
#authModal{
  position:fixed;inset:0;z-index:800;
  background:rgba(6,13,26,.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:mfade .25s ease;
}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.auth-sheet{
  background:#fff;
  border-radius:28px;
  padding:32px 24px 28px;
  width:100%;max-width:380px;
  animation:mup .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 32px 80px rgba(0,0,0,.4);
}
@keyframes mup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.auth-handle{display:none}
.auth-icon{font-size:44px;text-align:center;margin-bottom:10px}
.auth-title{font-size:22px;font-weight:900;color:#0F1923;text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.auth-sub{font-size:13px;color:#9BA8B5;text-align:center;margin-bottom:24px;line-height:1.5}
.auth-pw-wrap{position:relative;margin-bottom:10px}
.auth-pw-inp{
  width:100%;padding:16px 52px 16px 18px;
  background:#F7F9FC;border:1.5px solid #E8EDF4;border-radius:16px;
  font-size:18px;letter-spacing:2px;text-align:center;
  outline:none;font-family:inherit;color:#0F1923;
  -webkit-appearance:none;transition:border-color .2s,box-shadow .2s;
}
.auth-pw-inp:focus{border-color:#1C6EFF;box-shadow:0 0 0 3px rgba(28,110,255,.1)}
.auth-pw-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:22px;color:#9BA8B5;padding:4px;
}
.auth-err{
  font-size:13px;color:#EF4444;font-weight:700;
  text-align:center;min-height:20px;margin-bottom:8px;
}
.auth-shake{animation:ashake .35s}
@keyframes ashake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.auth-att{font-size:12px;color:#F59E0B;font-weight:700;text-align:center;margin-bottom:12px;min-height:16px}
.auth-btn{
  width:100%;padding:17px;border-radius:16px;border:none;
  font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
  background:linear-gradient(135deg,#1344C8,#1C6EFF);
  color:#fff;box-shadow:0 6px 24px rgba(28,110,255,.4);
  transition:transform .15s;
}
.auth-btn:active{transform:scale(.97)}
.auth-cancel{
  width:100%;padding:13px;border:none;background:none;
  font-size:15px;font-weight:700;color:#9BA8B5;cursor:pointer;
  font-family:inherit;margin-top:8px;border-radius:12px;
  transition:background .2s;
}
.auth-cancel:active{background:#F2F4F8}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100dvh;max-height:100dvh;overflow:hidden;position:relative}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;
  background:linear-gradient(135deg,#060D1A 0%,#0A1628 60%,#0D2158 100%);
  padding:14px 16px 14px;
  display:flex;align-items:center;gap:12px;
}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.topbar-octo{
  width:40px;height:40px;border-radius:12px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.topbar-name{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.4px}
.topbar-name em{color:#1C6EFF;font-style:normal}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;font-weight:500}

/* Botão Admin na topbar */
.btn-admin{
  display:flex;align-items:center;gap:6px;
  padding:9px 14px;border-radius:50px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:800;
  transition:all .2s;flex-shrink:0;
}
.btn-admin.locked{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15)}
.btn-admin.locked:active{background:rgba(255,255,255,.18)}
.btn-admin.unlocked{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.4)}
.btn-admin.unlocked:active{transform:scale(.95)}
.btn-admin-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-admin.locked .btn-admin-dot{background:rgba(255,255,255,.4)}
.btn-admin.unlocked .btn-admin-dot{background:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.5)}50%{box-shadow:0 0 0 5px rgba(255,255,255,0)}}

/* ── TABS ── */
.tabs{
  flex-shrink:0;background:#fff;border-bottom:1.5px solid #EEF2F7;
  display:flex;padding:0 4px;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 4px;border:none;background:none;cursor:pointer;font-family:inherit;
  border-bottom:2.5px solid transparent;transition:all .2s;
}
.tab.on{border-bottom-color:#1C6EFF}
.tab-icon{font-size:18px;line-height:1}
.tab-lbl{font-size:10px;font-weight:700;color:#9BA8B5;letter-spacing:.1px}
.tab.on .tab-lbl{color:#1C6EFF}
/* Cadeado nas abas protegidas quando bloqueado */
.tab-lock{font-size:8px;position:absolute;top:8px;right:6px;opacity:.5}

/* ── BODY ── */
.tab-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
.tab-body::-webkit-scrollbar{display:none}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(16px);
  background:#0F1923;color:#fff;padding:11px 22px;border-radius:50px;
  font-size:13.5px;font-weight:600;opacity:0;transition:all .3s;
  white-space:nowrap;pointer-events:none;z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL GENÉRICO ── */
.mover{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:flex-end;animation:mfade .2s;
}
.mbox{
  background:#fff;border-radius:26px 26px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%;max-height:84dvh;overflow-y:auto;
  animation:mup .3s cubic-bezier(.34,1.56,.64,1);
}
.mbox::-webkit-scrollbar{display:none}
.m-handle{width:40px;height:4px;background:#E4E8F0;border-radius:2px;margin:0 auto 18px}
.m-title{font-size:20px;font-weight:900;color:#0F1923;margin-bottom:16px;letter-spacing:-.4px}
.m-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F0F4F8;gap:12px}
.m-row:last-of-type{border-bottom:none}
.m-lbl{font-size:13px;color:#6B7A8D;flex-shrink:0}
.m-val{font-size:13.5px;font-weight:800;color:#0F1923;text-align:right}

/* ── UTILS ── */
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05)}
.sec{margin-bottom:20px}
.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#9BA8B5;margin-bottom:10px;padding-left:4px}
.acard{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05)}
.arow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #F0F4F8;gap:13px;transition:background .12s}
.arow:last-child{border-bottom:none}
.arow.tap{cursor:pointer}.arow.tap:active{background:#F7F9FC}
.arow-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.arow-info{flex:1;min-width:0}
.arow-title{font-size:14.5px;font-weight:700;color:#0F1923}
.arow-sub{font-size:12px;color:#9BA8B5;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arr{color:#C8D0DA;font-size:18px;flex-shrink:0}
.tog{width:48px;height:27px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.tog.on{background:#1C6EFF}.tog.off{background:#D1D9E6}
.tog::after{content:'';position:absolute;top:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{left:24px}.tog.off::after{left:3px}
.field-wrap{padding:8px 16px 12px;background:#F7F9FC}
.field-inner{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #E8EDF4;border-radius:12px;padding:10px 12px;transition:border-color .2s}
.field-inner:focus-within{border-color:#1C6EFF}
.field-inp{flex:1;border:none;background:none;font-size:15px;font-weight:700;color:#0F1923;font-family:inherit;outline:none}
.field-inp::placeholder{color:#BCC5D0;font-weight:500}
.field-save{background:#1C6EFF;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0;transition:transform .12s}
.field-save:active{transform:scale(.92)}
.green{color:#10B981}.red{color:#EF4444}.orange{color:#F59E0B}.blue{color:#1C6EFF}
.btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#1344C8,#1C6EFF);color:#fff;box-shadow:0 6px 20px rgba(28,110,255,.35)}
.btn-g{background:#EEF2F7;color:#6B7A8D;font-weight:700}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:10px}
.badge-on{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:#DCFCE7;color:#16A34A}
.badge-off{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:#FEE2E2;color:#DC2626}
.badge-pend{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:#FEF3C7;color:#D97706}

/* ── SUMMARY ── */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sum-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);text-align:center}
.sum-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;margin:4px 0}
.sum-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#9BA8B5}

/* ── CLIENT CARDS ── */
.cli-card{background:#fff;border-radius:20px;padding:15px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);cursor:pointer;transition:transform .12s}
.cli-card:active{transform:scale(.985)}
.cli-card-top{display:flex;align-items:center;gap:13px}
.cli-avatar{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.cli-info{flex:1;min-width:0}
.cli-name{font-size:16px;font-weight:800;color:#0F1923;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cli-meta{font-size:12px;color:#9BA8B5;margin-top:2px}
.cli-actions{display:flex;gap:6px;flex-shrink:0}
.cli-btn{width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .12s;flex-shrink:0}
.cli-btn:active{transform:scale(.88)}
.cli-stats{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.cli-stat{background:#F2F4F8;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:#6B7A8D}
.cli-stat.ok{background:#DCFCE7;color:#16A34A}

/* ── DETAIL PANEL ── */
#detPanel{position:fixed;inset:0;z-index:600;background:#F2F4F8;display:flex;flex-direction:column;overflow:hidden;animation:slidein .25s ease}
@keyframes slidein{from{transform:translateX(100%)}to{transform:none}}
.det-hdr{flex-shrink:0;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px}
.det-back{width:36px;height:36px;border-radius:50%;background:#EEF2F7;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.det-back:active{background:#DDE3EC}
.det-hdr-info{flex:1;min-width:0}
.det-hdr-name{font-size:17px;font-weight:900;color:#0F1923;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-hdr-meta{font-size:12px;color:#9BA8B5;margin-top:1px}
.det-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.det-body::-webkit-scrollbar{display:none}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:#fff;border-radius:16px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.055);border:1px solid rgba(0,0,0,.05)}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#9BA8B5;margin-bottom:4px}
.kpi-val{font-size:21px;font-weight:900;letter-spacing:-.8px;line-height:1}
.hero-cli{background:linear-gradient(120deg,#1344C8,#1C6EFF);border-radius:20px;padding:20px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.hero-cli::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.07)}

/* ── HCARDS ── */
.hcard{background:#fff;border-radius:16px;padding:14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.055);border:1px solid rgba(0,0,0,.05)}
.hcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.hcard-mes{font-size:14.5px;font-weight:800;color:#0F1923}
.hcard-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hcard-item .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#9BA8B5;margin-bottom:2px}
.hcard-item .v{font-size:14px;font-weight:800}
.stag{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:800;margin-top:7px}
.stag.sp{background:#DCFCE7;color:#16A34A}.stag.sn{background:#FEE2E2;color:#DC2626}

/* ── LINK BOX ── */
.link-box{background:linear-gradient(135deg,rgba(28,110,255,.06),rgba(14,165,233,.04));border:1.5px solid rgba(28,110,255,.15);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.link-box-title{font-size:12px;font-weight:800;color:#1C6EFF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.link-url{font-size:12px;color:#3A4A5C;word-break:break-all;line-height:1.5;background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #E8EDF4;font-family:monospace}
.link-actions{display:flex;gap:8px;margin-top:10px}

/* ── DANGER ── */
.danger-card{background:#FFF5F5;border:1.5px solid #FECDD3;border-radius:18px;overflow:hidden}
.danger-row{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid #FEE2E2;cursor:pointer;transition:background .12s}
.danger-row:last-child{border-bottom:none}
.danger-row:active{background:#FEE2E2}
.danger-txt{font-size:14.5px;font-weight:700;color:#EF4444;flex:1}

/* ── SESSÃO ATIVA ── */
.sess-bar{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(5,150,105,.04));border:1px solid rgba(16,185,129,.2);border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sess-dot{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0;animation:pdot 2s infinite}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.sess-txt{font-size:13px;font-weight:700;color:#059669;flex:1}
.sess-time{font-size:12px;color:#9BA8B5;font-weight:600}
.btn-logout{background:none;border:1px solid #FECDD3;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#EF4444;cursor:pointer;font-family:inherit;transition:background .15s;flex-shrink:0}
.btn-logout:active{background:#FEE2E2}

/* ── ALTERAR SENHA ── */
.pw-field{width:100%;padding:13px 16px;background:#F7F9FC;border:1.5px solid #E8EDF4;border-radius:12px;font-size:16px;font-family:inherit;outline:none;color:#0F1923;-webkit-appearance:none;transition:border-color .2s;margin-bottom:10px}
.pw-field:focus{border-color:#1C6EFF}

/* ── LOCK OVERLAY (aba protegida sem auth) ── */
.lock-view{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60dvh;padding:32px;text-align:center}
.lock-view-icon{font-size:52px;margin-bottom:14px}
.lock-view-title{font-size:18px;font-weight:800;color:#0F1923;margin-bottom:6px}
.lock-view-sub{font-size:13.5px;color:#9BA8B5;line-height:1.6;margin-bottom:24px}

<script>

const R=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const K=v=>(+v||0).toLocaleString('pt-BR',{maximumFractionDigits:1})+' kWh';
const P=v=>(+v||0).toFixed(1)+'%';
const N=v=>+v||0;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MABR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const BAND={'Verde':'🟢 Verde — Normal','Amarela':'🟡 Amarela','Vermelha 1':'🔴 Vermelha Nível 1','Vermelha 2':'🔴 Vermelha Nível 2','Escassez':'⛔ Escassez'};
const BCOR={'Verde':'#10B981','Amarela':'#F59E0B','Vermelha 1':'#EF4444','Vermelha 2':'#DC2626','Escassez':'#7C3AED'};

/* ══════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════ */
const getClientes=()=>JSON.parse(localStorage.getItem('eo_clientes')||'[]');
const setClientes=d=>localStorage.setItem('eo_clientes',JSON.stringify(d));
const getPerfil=id=>JSON.parse(localStorage.getItem(`eo_perfil_${id}`)||'null');
const setPerfil=(id,d)=>localStorage.setItem(`eo_perfil_${id}`,JSON.stringify(d));
const getRegs=id=>JSON.parse(localStorage.getItem(`eo_regs_${id}`)||'[]');
const setRegs=(id,d)=>localStorage.setItem(`eo_regs_${id}`,JSON.stringify(d));
function getPw(){return localStorage.getItem('eo_admin_pw')||'Oct@2030';}
function setPw(p){localStorage.setItem('eo_admin_pw',p);}

function perfilDefault(nome){
  return{
    nome:nome||'Novo Cliente',saudacao:'👋',status:'ativo',cor:'#1C6EFF',emoji:'👤',obs:'',
    distribuidora:'',nrContrato:'',nrMedidor:'',nrInstalacao:'',
    classeConsumidor:'Residencial',grupoTensao:'Baixa Tensão',modalidade:'Convencional',vencimentoDia:'10',
    tarifaFP:'0,65',tarifaInt:'0,87',tarifaPonta:'1,34',tarifaPadrao:'0.653',bandeira:'Verde',meta:300,
    circ1Nome:'Ar-Condicionado',circ1Loc:'Quarto principal',circ1On:true,
    circ2Nome:'Cozinha',circ2Loc:'Fogão + micro-ondas',circ2On:true,
    circ3Nome:'Iluminação',circ3Loc:'Toda residência',circ3On:true,
    showCircuitos:true,showMetaVerde:true,showHorarioSolar:true,showBandeira:true,
    showInicio:true,showConsumo:true,showFatura:true,showDicas:true,showRegistro:true,
    criado:new Date().toISOString()
  };
}

/* ══════════════════════════════════════════════
   AUTH — modal ao clicar no botão Admin
══════════════════════════════════════════════ */
let isAuth=false;
let authAttempts=0;
let sessStart=null;
let curTab='visao';
let curCid=null;

// Abas que exigem autenticação
const PROTECTED=['clientes','editar','sistema','visual','dados'];

function onAdminBtnClick(){
  if(isAuth){
    // Já autenticado → mostra menu de opções
    openAuthMenu();
  } else {
    // Não autenticado → abre modal de senha
    openAuthModal();
  }
}

function openAuthModal(){
  document.getElementById('authPwInp').value='';
  document.getElementById('authErr').textContent='';
  document.getElementById('authAtt').textContent='';
  document.getElementById('authModal').style.display='flex';
  setTimeout(()=>document.getElementById('authPwInp').focus(),350);
}
function closeAuthModal(){
  document.getElementById('authModal').style.display='none';
}
function toggleAuthPw(){
  const i=document.getElementById('authPwInp');
  const e=document.getElementById('authPwEye');
  i.type=i.type==='password'?'text':'password';
  e.textContent=i.type==='password'?'👁':'🙈';
}
function doAuth(){
  const pw=(document.getElementById('authPwInp').value||'').trim();
  if(pw===getPw()){
    // Sucesso
    isAuth=true; authAttempts=0; sessStart=new Date();
    closeAuthModal();
    updateAdminBtn();
    startSessTimer();
    // Vai para clientes automaticamente
    switchTab('clientes');
    toast('✅ Admin liberado!');
  } else {
    authAttempts++;
    const err=document.getElementById('authErr');
    const att=document.getElementById('authAtt');
    err.textContent='Senha incorreta.';
    err.classList.remove('auth-shake'); void err.offsetWidth; err.classList.add('auth-shake');
    document.getElementById('authPwInp').value='';
    if(authAttempts>=2) att.textContent=`⚠️ ${authAttempts} tentativa${authAttempts>1?'s':''} errada${authAttempts>1?'s':''}`;
    if(authAttempts>=5){
      const btn=document.getElementById('authBtn');
      btn.disabled=true; att.textContent='🔒 Bloqueado por 30s';
      setTimeout(()=>{authAttempts=0;btn.disabled=false;att.textContent='';},30000);
    }
  }
}
// CSS da animação de shake no auth-err
document.addEventListener('DOMContentLoaded',()=>{
  const style=document.createElement('style');
  style.textContent='.auth-shake{animation:ashake .35s}@keyframes ashake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}';
  document.head.appendChild(style);
});

function openAuthMenu(){
  // Modal com opções quando já autenticado
  const d=new Date()-sessStart;
  const sessStr=`${Math.floor(d/60000)}m ${Math.floor((d%60000)/1000)}s`;
  openMod(`
    <div class="m-title">⚙️ Admin</div>
    <div class="sess-bar" style="margin-bottom:14px">
      <div class="sess-dot"></div>
      <div class="sess-txt">Sessão ativa</div>
      <div class="sess-time">${sessStr}</div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
    <div class="acard">
      <div class="arow tap" onclick="closeMod();switchTab('clientes')">
        <div class="arow-ico" style="background:#EEF3FF">👥</div>
        <div class="arow-info"><div class="arow-title">Gerenciar Clientes</div><div class="arow-sub">Ver, adicionar, editar</div></div>
        <div class="arr">›</div>
      </div>
      <div class="arow tap" onclick="closeMod();switchTab('editar')">
        <div class="arow-ico" style="background:#FFF8EC">✏️</div>
        <div class="arow-info"><div class="arow-title">Editar Perfil</div><div class="arow-sub">Dados, tarifas, conta</div></div>
        <div class="arr">›</div>
      </div>
      <div class="arow tap" onclick="closeMod();switchTab('sistema')">
        <div class="arow-ico" style="background:#EDFBF3">🔌</div>
        <div class="arow-info"><div class="arow-title">Sistema / Circuitos</div><div class="arow-sub">Gerenciar circuitos</div></div>
        <div class="arr">›</div>
      </div>
      <div class="arow tap" onclick="closeMod();switchTab('visual')">
        <div class="arow-ico" style="background:#F3F0FF">👁</div>
        <div class="arow-info"><div class="arow-title">Visual / Telas</div><div class="arow-sub">Controlar visibilidade</div></div>
        <div class="arr">›</div>
      </div>
      <div class="arow tap" onclick="closeMod();switchTab('dados')">
        <div class="arow-ico" style="background:#F0F4FF">🗄</div>
        <div class="arow-info"><div class="arow-title">Dados / Backup</div><div class="arow-sub">Exportar, importar, danger zone</div></div>
        <div class="arr">›</div>
      </div>
      <div class="arow tap" onclick="closeMod();openChangePw()">
        <div class="arow-ico" style="background:#F7F9FC">🔑</div>
        <div class="arow-info"><div class="arow-title">Alterar Senha</div><div class="arow-sub">Mudar senha do admin</div></div>
        <div class="arr">›</div>
      </div>
    </div>
    <button class="btn" style="background:#FEE2E2;color:#EF4444;margin-top:12px;font-weight:800" onclick="doLogout()">🚪 Encerrar Sessão</button>
  `);
}

function doLogout(){
  if(!confirm('Encerrar sessão administrativa?')) return;
  isAuth=false; sessStart=null; authAttempts=0;
  clearInterval(window._st);
  updateAdminBtn();
  closeMod();
  switchTab('visao');
  toast('🔒 Sessão encerrada.');
}

function openChangePw(){
  closeMod();
  openMod(`
    <div class="m-title">🔑 Alterar Senha Admin</div>
    <div style="font-size:13px;color:#6B7A8D;margin-bottom:16px;line-height:1.5">A nova senha será salva neste navegador.</div>

function salvarNovaSenha(){
  const p1=(document.getElementById('cpw1').value||'').trim();
  const p2=(document.getElementById('cpw2').value||'').trim();
  if(p1.length<6){toast('⚠️ Mínimo 6 caracteres.');return;}
  if(p1!==p2){toast('⚠️ Senhas não conferem.');return;}
  setPw(p1);closeMod();
  toast('✅ Senha alterada!');
}

function updateAdminBtn(){
  const btn=document.getElementById('btnAdmin');
  const lbl=document.getElementById('btnAdminLbl');
  if(isAuth){
    btn.className='btn-admin unlocked';
    lbl.textContent='Admin ✓';

  }
}

function startSessTimer(){
  clearInterval(window._st);
  window._st=setInterval(()=>{
    if(!sessStart||!isAuth) return;
    // atualiza topSub com tempo de sessão
    const d=new Date()-sessStart;
    document.getElementById('topSub').textContent=
      `Admin ativo · ${Math.floor(d/60000)}m ${Math.floor((d%60000)/1000)}s`;
  },1000);
}

let _tt;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('on'),2800);}
function openMod(html){document.getElementById('mbody').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeMod(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').style.display='none';}

/* ══════════════════════════════════════════════
   TABS
══════════════════════════════════════════════ */
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  renderTab();
}
function renderTab(){
  const t=curTab;
  if(PROTECTED.includes(t)&&!isAuth){ renderLockView(t); return; }
  if(t==='visao')    renderVisao();
  else if(t==='clientes') renderClientes();
  else if(t==='editar')   renderEditar();
  else if(t==='sistema')  renderSistema();
  else if(t==='visual')   renderVisual();
  else if(t==='dados')    renderDados();
}

function saveRegAdmin(cid){
  const mes=document.getElementById('rm_mes').value;
  const prod=document.getElementById('rm_prod').value;
  const cons=document.getElementById('rm_cons').value;
  const tar=document.getElementById('rm_tar').value;
  if(!mes||!prod||!cons||!tar){toast('⚠️ Preencha mês, produção, consumo e tarifa.');return;}
  const p2=N(prod),c=N(cons),t=N(tar),tx=N(document.getElementById('rm_tax').value),pa=N(document.getElementById('rm_parc').value);
  const reg={id:uid(),mes,producao:prod,consumo:cons,tarifa:tar,
    taxa:document.getElementById('rm_tax').value,parcela:document.getElementById('rm_parc').value,
    obs:document.getElementById('rm_obs').value,
    saldo:(p2-c).toFixed(2),economia:(p2*t).toFixed(2),
    saldoFin:(p2*t-tx-pa).toFixed(2),autoSuf:(c>0?(p2/c)*100:0).toFixed(2),
    criado:new Date().toISOString()};
  const regs=getRegs(cid);const idx=regs.findIndex(r=>r.mes===mes);
  if(idx>=0) regs[idx]=reg; else regs.push(reg);
  setRegs(cid,regs);closeMod();toast('✅ Registro salvo!');
  if(document.getElementById('detPanel').style.display!=='none') openDet(cid);
  else renderTab();
}
function delReg(cid,rid){
  if(!confirm('Excluir este registro?')) return;
  setRegs(cid,getRegs(cid).filter(r=>r.id!==rid));
  toast('🗑 Registro excluído.');openDet(cid);
}

/* ══════════════════════════════════════════════
   UPLOAD PDF — lê a fatura e preenche campos
══════════════════════════════════════════════ */
function handlePdfUpload(event, cid) {
  var file = event.target.files[0];
  if (!file) return;
  var status = document.getElementById('pdfStatus');
  if (status) status.textContent = '⏳ Lendo fatura com IA...';

  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = btoa(String.fromCharCode.apply(null, new Uint8Array(e.target.result)));
    
    // Usa API do Claude para extrair dados do PDF
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
            { type: 'text', text: 'Extraia os dados desta fatura de energia elétrica brasileira. Responda APENAS com JSON puro (sem markdown, sem ```), no formato: {"nome":"","distribuidora":"","codCliente":"","medidor":"","codInstalacao":"","classe":"","modalidade":"","diaVencimento":"","bandeira":"","tarifaMedia":"","historico":[{"mes":"2026-04","consumo":425}]}. Para o histórico, converta ABR26 para 2026-04, MAR26 para 2026-03, etc.' }
          ]
        }]
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var text = '';
      if (data.content) {
        data.content.forEach(function(b){ if(b.type==='text') text += b.text; });
      }
      text = text.replace(/```json|```/g, '').trim();
      
      var parsed;
      try { parsed = JSON.parse(text); } catch(e) {
        if (status) status.innerHTML = '⚠️ Erro ao interpretar fatura. Preencha manualmente.';
        return;
      }

      // Preenche campos
      var mapping = {
        'ed_nome': parsed.nome,
        'ed_distribuidora': parsed.distribuidora,
        'ed_nrContrato': parsed.codCliente,
        'ed_nrMedidor': parsed.medidor,
        'ed_nrInstalacao': parsed.codInstalacao,
        'ed_classeConsumidor': parsed.classe,
        'ed_modalidade': parsed.modalidade,
        'ed_vencimentoDia': parsed.diaVencimento,
        'ed_tarifaPadrao': parsed.tarifaMedia,
      };
      for (var id in mapping) {
        if (mapping[id]) {
          var inp = document.getElementById(id);
          if (inp) inp.value = mapping[id];
        }
      }
      if (parsed.bandeira) {
        var sel = document.getElementById('ed_bandeira');
        if (sel) sel.value = parsed.bandeira;
      }

      // Importa histórico
      if (parsed.historico && parsed.historico.length > 0) {
        var regs = getRegs(cid);
        var tar = parsed.tarifaMedia ? parseFloat(parsed.tarifaMedia) : 0.65;
        parsed.historico.forEach(function(h) {
          var existing = regs.findIndex(function(r){ return r.mes === h.mes; });
          var cons = parseInt(h.consumo) || 0;
          var reg = {
            id: uid(), mes: h.mes, producao: '0', consumo: String(cons),
            tarifa: String(tar), taxa: '0', parcela: '0', obs: 'Importado da fatura',
            saldo: String(-cons), economia: '0', saldoFin: '0',
            autoSuf: '0', criado: new Date().toISOString()
          };
          if (existing >= 0) regs[existing] = reg; else regs.push(reg);
        });
        setRegs(cid, regs);
        if (status) status.textContent = '✅ Fatura importada! ' + parsed.historico.length + ' meses de consumo.';
      } else {
        if (status) status.textContent = '✅ Dados do cliente importados!';
      }
      toast('📄 Fatura importada com sucesso!');
    })
    .catch(function(err) {
      if (status) status.innerHTML = '⚠️ Erro na leitura: ' + err.message + '<br>Preencha manualmente.';
    });
  };
  reader.readAsArrayBuffer(file);
}

/* Parse inteligente de texto extraído de fatura */
function parseFatura(text) {
  var r = { nome:'', distribuidora:'', codCliente:'', medidor:'', codInstalacao:'',
            classe:'', modalidade:'', diaVenc:'', bandeira:'', tarifaMedia:'', historico:[] };

  // Distribuidora
  if (/neoenergia/i.test(text)) r.distribuidora = 'Neoenergia';
  else if (/enel/i.test(text)) r.distribuidora = 'ENEL';
  else if (/cemig/i.test(text)) r.distribuidora = 'CEMIG';
  else if (/cpfl/i.test(text)) r.distribuidora = 'CPFL';
  else if (/light/i.test(text)) r.distribuidora = 'Light';
  else if (/equatorial/i.test(text)) r.distribuidora = 'Equatorial';
  else if (/energisa/i.test(text)) r.distribuidora = 'Energisa';
  else if (/coelba/i.test(text)) r.distribuidora = 'Coelba';
  else if (/celpe/i.test(text)) r.distribuidora = 'CELPE';

  // Nome do cliente
  var nomeMatch = text.match(/NOME\s*(?:DO\s*)?CLIENTE[:\s]*([A-ZÁÉÍÓÚÂÊÎÔÛÃÕÇ][A-ZÁÉÍÓÚÂÊÎÔÛÃÕÇ\s]{4,60})/i);
  if (nomeMatch) r.nome = nomeMatch[1].trim();

  // Código do cliente
  var codMatch = text.match(/C[ÓO]DIGO\s*(?:DO\s*)?CLIENTE[:\s]*(\d{5,15})/i);
  if (codMatch) r.codCliente = codMatch[1];

  // Código da instalação
  var instMatch = text.match(/C[ÓO]DIGO\s*(?:DA\s*)?INSTALA[ÇC][ÃA]O[:\s]*(\d{5,15})/i);
  if (instMatch) r.codInstalacao = instMatch[1];

  // Medidor
  var medMatch = text.match(/MEDIDOR[:\s]*(\d{5,15})/i);
  if (!medMatch) medMatch = text.match(/(\d{10})\s*Energia\s*Ativa/i);
  if (medMatch) r.medidor = medMatch[1];

  // Classe
  if (/RESIDENCIAL/i.test(text)) r.classe = 'Residencial';
  else if (/COMERCIAL/i.test(text)) r.classe = 'Comercial';
  else if (/INDUSTRIAL/i.test(text)) r.classe = 'Industrial';
  else if (/RURAL/i.test(text)) r.classe = 'Rural';

  // Modalidade
  if (/Monof[aá]sico/i.test(text)) r.modalidade = 'Conv. Monofásico';
  else if (/Bif[aá]sico/i.test(text)) r.modalidade = 'Conv. Bifásico';
  else if (/Trif[aá]sico/i.test(text)) r.modalidade = 'Conv. Trifásico';

  // Vencimento
  var vencMatch = text.match(/VENCIMENTO[:\s]*(\d{2})[\/\-](\d{2})[\/\-](\d{4})/i);
  if (vencMatch) r.diaVenc = vencMatch[1];

  // Bandeira
  if (/bandeira.*Verde/i.test(text)) r.bandeira = 'Verde';
  else if (/bandeira.*Amarela/i.test(text)) r.bandeira = 'Amarela';
  else if (/bandeira.*Vermelha.*2/i.test(text)) r.bandeira = 'Vermelha 2';
  else if (/bandeira.*Vermelha/i.test(text)) r.bandeira = 'Vermelha 1';

  // Tarifa média (TUSD)
  var tarMatch = text.match(/Consumo-TUSD\s*kWh\s*[\d,.]+\s*([\d,]+)/);
  if (tarMatch) r.tarifaMedia = tarMatch[1].replace(',','.');

  // Histórico de consumo mensal
  var meses = {'JAN':'01','FEV':'02','MAR':'03','ABR':'04','MAI':'05','JUN':'06',
               'JUL':'07','AGO':'08','SET':'09','OUT':'10','NOV':'11','DEZ':'12'};
  var histRegex = /(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)\s*(\d{2})\s+(\d{1,5})\s+\d{1,3}/gi;
  var m;
  while ((m = histRegex.exec(text)) !== null) {
    var mesAbr = m[1].toUpperCase();
    var ano = '20' + m[2];
    var cons = parseInt(m[3]);
    if (meses[mesAbr] && cons > 0 && cons < 9999) {
      r.historico.push({ mes: ano + '-' + meses[mesAbr], consumo: cons });
    }
  }

  return r;
}

  const val=inp.value.trim();
  const p=getPerfil(cid)||perfilDefault('');p[field]=val;setPerfil(cid,p);

  if(subId && subId!=='_none'){const sub=document.getElementById(subId);if(sub) sub.textContent=val||'—';}

  const cl=getClientes();const idx=cl.findIndex(c=>c.id===cid);

  toast('✅ '+field+' salvo!');
}

/* ══════════════════════════════════════════════
   AUDIO ENGINE — Web Audio API
   iOS Safari: AudioContext só funciona dentro de
   um event handler síncrono de touchstart/click.
   Por isso o splash é um <button> e o AudioContext
   é criado e resumido DENTRO do handler.
══════════════════════════════════════════════ */

let _ctx = null;
let _audioPlayed = false;

function initAudio() {
  // Cria o contexto DENTRO do evento de toque (obrigatório iOS)
  if (!_ctx) {
    try {
      _ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return false; }
  }
  if (_ctx.state === 'suspended') {
    _ctx.resume();
  }
  return _ctx.state !== 'closed';
}

function note(freq, start, dur, type, vol, atk, rel, bend) {
  if (!_ctx) return;
  type = type || 'sine'; vol = vol || 0.14; atk = atk || 0.04; rel = rel || 0.15; bend = bend || 0;
  const t = _ctx.currentTime + start;
  const osc = _ctx.createOscillator();
  const env = _ctx.createGain();
  const flt = _ctx.createBiquadFilter();
  flt.type = 'lowpass'; flt.frequency.value = 3400; flt.Q.value = 0.7;
  osc.connect(flt); flt.connect(env); env.connect(_ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (bend) osc.frequency.linearRampToValueAtTime(freq + bend, t + dur);
  env.gain.setValueAtTime(0.001, t);
  env.gain.linearRampToValueAtTime(vol, t + atk);
  env.gain.setValueAtTime(vol, t + dur - rel);
  env.gain.linearRampToValueAtTime(0.001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}

function chord(freqs, start, dur, vol) {
  freqs.forEach(function(f){ note(f, start, dur, 'sine', vol || 0.08, 0.06, 0.2); });
}

function playJingle() {
  if (_audioPlayed) return;
  if (!initAudio()) return; // falhou no iOS — silencioso
  _audioPlayed = true;

  // Sub-bass elétrico
  note(55,  0.00, 0.85, 'triangle', 0.06, 0.10, 0.30);
  note(110, 0.00, 0.85, 'triangle', 0.04, 0.10, 0.30);

  // Acorde base Mi maior
  chord([164.81, 207.65, 246.94], 0.08, 1.0, 0.06);

  // Arpejo solar ascendente Mi3→Sol#3→Si3→Mi4→Sol#4→Si4
  [329.63, 415.30, 493.88, 659.25, 830.61, 987.77].forEach(function(f, i) {
    note(f, i * 0.13, 0.22, 'triangle', 0.12, 0.03, 0.08, 6);
  });

  // Resolução brilhante
  chord([523.25, 659.25, 783.99, 1046.50], 1.05, 0.90, 0.07);
  note(1318.51, 1.08, 0.70, 'triangle', 0.09, 0.05, 0.35, 18);

  // Shimmer final
  [2093, 2637, 3136].forEach(function(f, i) {
    note(f, 1.18 + i * 0.05, 0.50, 'sine', 0.032, 0.03, 0.28);
  });

  // Fade final
  note(659.25, 1.85, 0.55, 'sine', 0.05, 0.05, 0.45);
}

/* ══════════════════════════════════════════════
   IMPORTAR FATURA PDF
══════════════════════════════════════════════ */
function handlePdfUpload(event){
  var file=event.target.files[0];
  if(!file)return;
  toast('📄 Processando fatura...');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=extractPdfText(new Uint8Array(e.target.result));
      if(!text||text.length<30){toast('⚠️ PDF não legível.');return;}
      var dados=parseFatura(text);
      if(!dados.nome){toast('⚠️ Nome não encontrado no PDF.');return;}
      criarClienteDaFatura(dados);
    }catch(err){toast('❌ Erro: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
  event.target.value='';
}

function extractPdfText(bytes){
  var s='',i;
  for(i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]);
  var text='',m,m2;
  // Strings em operadores Tj
  var r1=/\(([^)]+)\)\s*Tj/g;
  while((m=r1.exec(s))!==null) text+=m[1]+' ';
  // Arrays TJ
  var r2=/\[([^\]]*)\]\s*TJ/gi;
  while((m=r2.exec(s))!==null){
    var r3=/\(([^)]*)\)/g;
    while((m2=r3.exec(m[1]))!==null) text+=m2[1];
    text+=' ';
  }
  // Streams
  var r4=/stream\r?\n([\s\S]*?)endstream/g;
  while((m=r4.exec(s))!==null){
    var r5=/\(([^)]{2,})\)/g;
    while((m2=r5.exec(m[1]))!==null){
      var t=m2[1].replace(/\\n/g,' ').replace(/\\/g,'');
      if(/[A-Za-zÀ-ú0-9]/.test(t)) text+=t+' ';
    }
  }
  return text;
}

function parseFatura(text){
  var d={},t=text.replace(/\s+/g,' ');
  // Nome
  var nm=t.match(/NOME DO CLIENTE[:\s]*([A-ZÀ-Ú][A-ZÀ-Ú\s]{4,})/i);
  if(nm) d.nome=nm[1].trim().replace(/\s+/g,' ');
  if(!d.nome){nm=t.match(/(?:CLIENTE|PAGADOR)[:\s]*([A-ZÀ-Ú][A-ZÀ-Ú\s]{4,})/i);if(nm)d.nome=nm[1].trim().replace(/\s+/g,' ');}
  // Distribuidora
  var di=t.match(/(NEOENERGIA|CELPE|CEMIG|ENEL|CPFL|ENERGISA|EQUATORIAL|COELBA|LIGHT|ELEKTRO|EDP|COPEL|CELESC|RGE|COSERN)/i);
  if(di)d.distribuidora=di[1].toUpperCase();
  var df=t.match(/COMPANHIA[A-ZÀ-Ú\s]{5,}(?=\s*(?:AV|RUA|CNPJ))/i);
  if(df)d.distribuidoraFull=df[0].trim();
  // Instalação, Contrato, Medidor
  var inst=t.match(/(?:INSTALA[ÇC][AÃ]O|C[ÓO]DIGO DA INSTALA)[A-ZÃO\s]*[:\s]*(\d{5,})/i);
  if(inst)d.nrInstalacao=inst[1];
  var cod=t.match(/C[ÓO]DIGO DO CLIENTE[:\s]*(\d{5,})/i);
  if(cod)d.nrContrato=cod[1];
  var med=t.match(/MEDIDOR[:\s]*(\d{5,})/i);
  if(!med)med=t.match(/(\d{10})\s+Energia\s+Ativa/i);
  if(med)d.nrMedidor=med[1];
  // Classe
  if(/RESIDENCIAL/i.test(t))d.classeConsumidor='Residencial';
  else if(/COMERCIAL/i.test(t))d.classeConsumidor='Comercial';
  else if(/INDUSTRIAL/i.test(t))d.classeConsumidor='Industrial';
  // Tipo
  if(/[Mm]onof/i.test(t))d.grupoTensao='Monofásico';
  else if(/[Bb]if/i.test(t))d.grupoTensao='Bifásico';
  else if(/[Tt]rif/i.test(t))d.grupoTensao='Trifásico';
  // Vencimento
  var vc=t.match(/VENCIMENTO[:\s]*(\d{2})[\/\-](\d{2})/i);
  if(vc)d.vencimentoDia=vc[1];
  // Bandeira
  if(/bandeira.*Verde/i.test(t))d.bandeira='Verde';
  else if(/bandeira.*Amarela/i.test(t))d.bandeira='Amarela';
  else if(/bandeira.*Vermelha.*2/i.test(t))d.bandeira='Vermelha 2';
  else if(/bandeira.*Vermelha/i.test(t))d.bandeira='Vermelha 1';
  // Tarifa
  var tar=t.match(/(\d+[,.]\d{5,})/);
  if(tar)d.tarifaPadrao=tar[1].replace(',','.');
  // Consumo atual
  var cons=t.match(/kWh\s*(\d{2,5})[,.]00/);
  if(cons)d.consumoAtual=parseInt(cons[1]);
  // Ref mês/ano
  var ref=t.match(/(\d{2})[\/](\d{4})/);
  if(ref)d.mesRef=ref[2]+'-'+ref[1];
  // Histórico
  d.historico=[];
  var mesMap={JAN:'01',FEV:'02',MAR:'03',ABR:'04',MAI:'05',JUN:'06',JUL:'07',AGO:'08',SET:'09',OUT:'10',NOV:'11',DEZ:'12'};
  var hr=/(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)\s*(\d{2})\s+(\d{2,4})\s+(\d{2,3})/gi;
  var hm;
  while((hm=hr.exec(t))!==null){
    var mes=mesMap[hm[1].toUpperCase()]||'01';
    var ano=hm[2].length===2?'20'+hm[2]:hm[2];
    var kwh=parseInt(hm[3]);
    if(kwh>0&&kwh<10000)d.historico.push({mes:ano+'-'+mes,consumo:kwh});
  }
  return d;
}

function criarClienteDaFatura(dados){
  var id=uid();
  var perfil=perfilDefault(dados.nome||'Novo Cliente');
  if(dados.distribuidora)perfil.distribuidora=dados.distribuidoraFull||dados.distribuidora;
  if(dados.nrInstalacao)perfil.nrInstalacao=dados.nrInstalacao;
  if(dados.nrContrato)perfil.nrContrato=dados.nrContrato;
  if(dados.nrMedidor)perfil.nrMedidor=dados.nrMedidor;
  if(dados.classeConsumidor)perfil.classeConsumidor=dados.classeConsumidor;
  if(dados.grupoTensao)perfil.grupoTensao=dados.grupoTensao;
  if(dados.vencimentoDia)perfil.vencimentoDia=dados.vencimentoDia;
  if(dados.bandeira)perfil.bandeira=dados.bandeira;
  if(dados.tarifaPadrao)perfil.tarifaPadrao=dados.tarifaPadrao;
  setPerfil(id,perfil);
  var cl=getClientes();cl.push({id:id,nome:perfil.nome,status:'ativo'});setClientes(cl);
  // Registros do histórico
  var regs=[];
  if(dados.historico&&dados.historico.length>0){
    var tar=parseFloat(perfil.tarifaPadrao)||0.653;
    dados.historico.forEach(function(h){
      regs.push({id:uid(),mes:h.mes,producao:'0',consumo:String(h.consumo),
        tarifa:String(tar),taxa:'0',parcela:'0',obs:'Importado da fatura',
        saldo:String(-h.consumo),economia:'0',saldoFin:'0',autoSuf:'0',
        criado:new Date().toISOString()});
    });
    setRegs(id,regs);
  }
  toast('✅ '+perfil.nome+' criado com '+regs.length+' registros!');
  curCid=id;
  // Resumo
  var r='<div class="m-title">📄 Fatura Importada</div>';
  r+='<div class="m-row"><span class="m-lbl">Nome</span><span class="m-val">'+esc(perfil.nome)+'</span></div>';
  if(dados.distribuidora)r+='<div class="m-row"><span class="m-lbl">Distribuidora</span><span class="m-val">'+esc(perfil.distribuidora)+'</span></div>';
  if(dados.nrContrato)r+='<div class="m-row"><span class="m-lbl">Cód. Cliente</span><span class="m-val">'+dados.nrContrato+'</span></div>';
  if(dados.nrInstalacao)r+='<div class="m-row"><span class="m-lbl">Instalação</span><span class="m-val">'+dados.nrInstalacao+'</span></div>';
  if(dados.nrMedidor)r+='<div class="m-row"><span class="m-lbl">Medidor</span><span class="m-val">'+dados.nrMedidor+'</span></div>';
  if(dados.classeConsumidor)r+='<div class="m-row"><span class="m-lbl">Classe</span><span class="m-val">'+dados.classeConsumidor+'</span></div>';
  if(dados.bandeira)r+='<div class="m-row"><span class="m-lbl">Bandeira</span><span class="m-val">'+dados.bandeira+'</span></div>';
  if(dados.consumoAtual)r+='<div class="m-row"><span class="m-lbl">Consumo Atual</span><span class="m-val">'+dados.consumoAtual+' kWh</span></div>';
  r+='<div class="m-row"><span class="m-lbl">Registros</span><span class="m-val">'+regs.length+' meses</span></div>';
  r+='<div style="margin-top:16px"><button class="btn btn-p" onclick="closeMod();switchTab(\'editar\')">✏️ Editar Cliente</button></div>';
  r+='<div style="margin-top:8px"><button class="btn btn-g" onclick="closeMod();renderClientes()">👥 Ver Clientes</button></div>';
  openMod(r);
}

/* ─── SPLASH CONTROL ─── */
var _splashDone = false;

function closeSplash() {
  if (_splashDone) return;
  _splashDone = true;
  var sp = document.getElementById('splash');
  if (!sp) { switchTab('visao'); return; }
  sp.style.opacity='0';
  sp.style.pointerEvents='none';
  sp.style.transition='opacity .5s ease';
  setTimeout(function() {
    sp.style.display='none';
    switchTab('visao');
  }, 600);
}

function splashTapped() {
  try { playJingle(); } catch(e) {}
  closeSplash();
}
